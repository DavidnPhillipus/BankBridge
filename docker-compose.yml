services:
  postgres:
    image: postgres:16-alpine
    container_name: bankbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bankbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bankbridge}
      POSTGRES_DB: ${POSTGRES_DB:-bankbridge}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bankbridge}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bankbridge-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # API and Web are run locally during development (npm run dev:api / dev:web).
  # Dockerfiles are provided in ./docker for containerized/prod builds and can be
  # wired in here when needed.

volumes:
  postgres_data:
  redis_data:
